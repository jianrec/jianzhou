<aside class="side-rail" aria-label="站点侧栏">
  <section class="side-card side-card--notice">
    <p class="side-card__label">{{ site.sidebar.notice_title | default: "站务公告" }}</p>
    <p>{{ site.sidebar.notice | default: "这里预留给你的公告、更新说明或站点介绍。" }}</p>
  </section>

  <section class="side-card">
    <a class="side-action" href="{{ '/about/' | relative_url }}">站点说明</a>
    <dl class="site-stats">
      <div>
        <dt>文章</dt>
        <dd>{{ site.posts | size }}</dd>
      </div>
      <div>
        <dt>分类</dt>
        <dd>{{ site.categories | size }}</dd>
      </div>
      <div>
        <dt>标签</dt>
        <dd>{{ site.tags | size }}</dd>
      </div>
    </dl>
  </section>
</aside>
