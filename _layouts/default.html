<!doctype html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1b1a18">
    <script>
      (function () {
        try {
          var theme = localStorage.getItem('theme');
          document.documentElement.setAttribute('data-theme', theme === 'light' ? 'light' : 'dark');
        } catch (error) {}
      })();
    </script>
    {% seo %}
    <link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }} Feed" href="{{ '/feed.xml' | absolute_url }}">
    {% if site.favicon and site.favicon != "" %}
      <link rel="icon" href="{{ site.favicon | relative_url }}" type="image/svg+xml">
    {% endif %}
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </head>
  <body>
    {% include header.html %}
    <main id="content" class="site-main">
      <div class="content-grid">
        <div class="content-primary">
          {{ content }}
        </div>
        {% unless page.sidebar == false %}
          {% include sidebar.html %}
        {% endunless %}
      </div>
    </main>
    {% include footer.html %}
    <script src="{{ '/assets/js/site.js' | relative_url }}"></script>
  </body>
</html>
