---
layout: default
---

<article class="page-shell">
  <header class="page-header">
    {% if page.eyebrow %}
      <p class="eyebrow">{{ page.eyebrow }}</p>
    {% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p>{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="content">
    {{ content }}
  </div>
</article>
