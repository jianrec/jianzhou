---
layout: default
---

<section class="home-intro">
  <p class="kicker">Personal Journal</p>
  <h1>{{ site.title }}</h1>
  <p>{{ site.description }}</p>
  <div class="intro-actions">
    <a href="{{ '/about/' | relative_url }}">关于我</a>
    <a href="{{ '/tags/' | relative_url }}">按标签浏览</a>
  </div>
</section>

<section class="post-feed" aria-labelledby="latest-title">
  <h2 id="latest-title">近期更新</h2>
  <ul class="post-list">
    {% for post in site.posts %}
      <li>
        <a class="post-list__title" href="{{ post.url | relative_url }}">
          {% if post.categories.size > 0 %}
            <span>{{ post.categories | first }}</span>
          {% endif %}
          {{ post.title }}
        </a>
        <time datetime="{{ post.date | date: "%Y-%m-%d" }}">{{ post.date | date: "%Y-%m-%d" }}</time>
      </li>
    {% endfor %}
  </ul>
</section>
