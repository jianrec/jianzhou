title: 周健的个人博客
description: 个人文章、学习资料和长期笔记存档
url: "https://jianrec.github.io"
baseurl: "/jianzhou"
lang: "zh-CN"
timezone: "Asia/Shanghai"

author:
  name: 周健
  email: ""

entry_link:
  text: "← 英文主页"
  url: "#"

waline_server: ""
reaction_api: ""

markdown: kramdown
permalink: /posts/:year-:month-:day-:title/

plugins:
  - jekyll-seo-tag

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .gitignore

collections:
  notes:
    output: true
    permalink: /notes/:path/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "周健"
      main_category: "随笔漫谈"
  - scope:
      path: ""
      type: "notes"
    values:
      layout: "post"
      author: "周健"

study_order: []
