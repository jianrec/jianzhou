title: "周健的个人博客"
description: "记录技术实践、阅读笔记与长期思考。"
lang: "zh-CN"
timezone: "Asia/Shanghai"

# 项目页仓库发布地址。
url: "https://jianrec.github.io"
baseurl: "/jianzhou"

author:
  name: "周健"
  bio: "把复杂问题拆开，写成可复用的经验。"
  location: "中国"
  email: ""
  github: "jianrec"

favicon: ""
google_analytics: ""
disqus: ""

entry_link:
  text: "← 英文主页"
  url: "#"

sidebar:
  notice_title: "站务公告"
  notice: "这里预留给你的公告、更新说明或站点介绍。"

navigation:
  - text: "首页"
    url: /
  - text: "学习资料"
    url: /learning/
  - text: "科研妙招"
    url: /research/
  - text: "生活攻略"
    url: /life/
  - text: "随笔漫谈"
    url: /essays/

permalink: /blog/:year/:month/:day/:title/
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "周健"
  - scope:
      path: ""
    values:
      layout: "page"

sass:
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
